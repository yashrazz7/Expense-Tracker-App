<!DOCTYPE html>
<html>
<head>
    <title>Expense Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        input, select { width: 92%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { width: 100%; padding: 12px; background: #5a67d8; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .delete-btn { color: #e53e3e; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Expense Manager</h1>
        <input type="text" id="name" placeholder="Item Name">
        <input type="number" id="amt" placeholder="Amount">
        <select id="cat"><option>Food</option><option>Travel</option><option>Shopping</option></select>
        <button onclick="submitExpense()">Add Expense</button>
        <table>
            <thead><tr><th>Item</th><th>Amt</th><th>Cat</th><th>Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
